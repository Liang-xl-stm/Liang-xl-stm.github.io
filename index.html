<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能门锁管理平台 - Supabase版</title>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- QRCode.js 库 -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <!-- Font Awesome 图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #f0f4f8;
            --card-bg: #ffffff;
            --primary: #1a73e8;
            --primary-dark: #1557b0;
            --primary-light: #e8f0fe;
            --success: #0d9e6c;
            --danger: #e54545;
            --warning: #f5a623;
            --text: #1f2937;
            --text-secondary: #6b7280;
            --text-light: #9ca3af;
            --border: #e5e7eb;
            --border-light: #f3f4f6;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.07), 0 2px 4px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.1), 0 8px 16px rgba(0, 0, 0, 0.06);
            --shadow-xl: 0 25px 50px rgba(0, 0, 0, 0.15);
            --radius-sm: 8px;
            --radius: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #e8eef5 0%, #dce3ed 30%, #eef1f6 60%, #e3e9f2 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
        }

        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .bg-particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(26, 115, 232, 0.06);
            animation: floatUp 15s infinite ease-in;
        }
        .bg-particle:nth-child(1) { width: 200px; height: 200px; left: 5%; animation-delay: 0s; animation-duration: 18s; }
        .bg-particle:nth-child(2) { width: 150px; height: 150px; left: 30%; animation-delay: -4s; animation-duration: 14s; }
        .bg-particle:nth-child(3) { width: 180px; height: 180px; left: 55%; animation-delay: -8s; animation-duration: 20s; }
        .bg-particle:nth-child(4) { width: 120px; height: 120px; left: 75%; animation-delay: -12s; animation-duration: 16s; }
        .bg-particle:nth-child(5) { width: 160px; height: 160px; left: 90%; animation-delay: -6s; animation-duration: 22s; }
        .bg-particle:nth-child(6) { width: 100px; height: 100px; left: 20%; animation-delay: -10s; animation-duration: 19s; }

        @keyframes floatUp {
            0% { transform: translateY(105vh) scale(0.3); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-20vh) scale(1.4); opacity: 0; }
        }

        .app-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            background: var(--card-bg);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            transition: all var(--transition);
            min-height: 560px;
        }

        .app-header-bar {
            height: 4px;
            background: linear-gradient(90deg, #1a73e8, #4a9af5, #1a73e8);
            background-size: 200% 100%;
            animation: shimmer 3s ease-in-out infinite;
        }
        @keyframes shimmer { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }

        .app-content { padding: 28px 24px 24px; position: relative; }

        .logo-area { text-align: center; margin-bottom: 24px; }
        .logo-icon {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, #1a73e8, #4a9af5);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 26px; color: #fff;
            box-shadow: 0 8px 24px rgba(26, 115, 232, 0.3);
            margin-bottom: 8px;
        }
        .logo-title { font-size: 20px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
        .logo-subtitle { font-size: 12px; color: var(--text-secondary); margin-top: 2px; letter-spacing: 0.5px; }

        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; letter-spacing: 0.2px; }
        .form-input-wrapper { position: relative; display: flex; align-items: center; }
        .form-input-wrapper .input-icon { position: absolute; left: 14px; color: var(--text-light); font-size: 15px; pointer-events: none; z-index: 1; transition: color var(--transition-fast); }
        .form-input {
            width: 100%; padding: 12px 14px 12px 40px;
            border: 2px solid var(--border); border-radius: var(--radius);
            font-size: 15px; color: var(--text); background: #fafbfc;
            transition: all var(--transition-fast); outline: none; font-family: inherit; letter-spacing: 0.3px;
        }
        .form-input:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px rgba(26, 115, 232, 0.08); }
        .form-input:focus~.input-icon, .form-input-wrapper:focus-within .input-icon { color: var(--primary); }
        .form-input.error { border-color: var(--danger); background: #fff5f5; }
        .form-error-msg { font-size: 11px; color: var(--danger); margin-top: 4px; display: none; letter-spacing: 0.3px; }
        .form-error-msg.show { display: block; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

        .btn {
            width: 100%; padding: 13px 20px; border: none; border-radius: var(--radius);
            font-size: 15px; font-weight: 600; cursor: pointer;
            transition: all var(--transition-fast); letter-spacing: 0.4px;
            position: relative; overflow: hidden; font-family: inherit;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-primary { background: linear-gradient(135deg, #1a73e8, #2563eb); color: #fff; box-shadow: 0 4px 14px rgba(26, 115, 232, 0.35); }
        .btn-primary:hover { box-shadow: 0 6px 20px rgba(26, 115, 232, 0.45); transform: translateY(-1px); }
        .btn-primary:active { transform: scale(0.97); box-shadow: 0 2px 8px rgba(26, 115, 232, 0.3); }
        .btn-outline { background: #fff; color: var(--primary); border: 2px solid var(--primary); }
        .btn-outline:hover { background: var(--primary-light); }
        .btn-danger { background: #fff; color: var(--danger); border: 2px solid var(--danger); }
        .btn-danger:hover { background: #fff5f5; }
        .btn-sm { width: auto; padding: 8px 16px; font-size: 13px; border-radius: var(--radius-sm); }
        .btn:disabled { opacity: 0.55; cursor: not-allowed; pointer-events: none; filter: grayscale(20%); }
        .btn .spinner {
            display: none; width: 18px; height: 18px;
            border: 2.5px solid rgba(255, 255, 255, 0.3); border-top-color: #fff;
            border-radius: 50%; animation: spin 0.7s linear infinite;
        }
        .btn.loading .spinner { display: inline-block; }
        .btn.loading .btn-text { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .link-text { color: var(--primary); cursor: pointer; font-weight: 500; transition: color var(--transition-fast); text-decoration: none; font-size: 13px; }
        .link-text:hover { color: var(--primary-dark); text-decoration: underline; }

        .card { background: #fafbfc; border: 1px solid var(--border-light); border-radius: var(--radius); padding: 16px; margin-bottom: 14px; transition: all var(--transition-fast); }
        .card-highlight { border: 2px solid var(--primary); background: var(--primary-light); box-shadow: 0 0 0 6px rgba(26, 115, 232, 0.03); }

        .qr-container {
            display: flex; flex-direction: column; align-items: center; padding: 20px;
            background: #fff; border-radius: var(--radius-lg); border: 2px dashed var(--border);
            margin: 16px 0; transition: all var(--transition);
        }
        .qr-container:hover { border-color: var(--primary); box-shadow: var(--shadow); }
        .qr-wrapper { padding: 12px; background: #fff; border-radius: var(--radius); box-shadow: var(--shadow-sm); display: inline-block; transition: all var(--transition); }
        .qr-wrapper canvas, .qr-wrapper img { display: block; border-radius: 4px; }
        .qr-label { font-size: 12px; color: var(--text-secondary); margin-top: 10px; text-align: center; letter-spacing: 0.3px; }
        .qr-uid { font-weight: 700; color: var(--primary); font-family: 'SF Mono', 'Consolas', 'Monaco', monospace; font-size: 13px; word-break: break-all; }

        .badge {
            display: inline-flex; align-items: center; gap: 5px; padding: 5px 10px;
            border-radius: 20px; font-size: 11px; font-weight: 600; letter-spacing: 0.3px;
        }
        .badge-success { background: #e6f7ee; color: #0d9e6c; }
        .badge-warning { background: #fff8e6; color: #b87a14; }
        .badge-danger { background: #fde8e8; color: #c53030; }
        .badge-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
        .badge-dot.green { background: #0d9e6c; animation: pulse-dot 2s infinite; }
        .badge-dot.orange { background: #f5a623; animation: pulse-dot 2s infinite; }
        .badge-dot.red { background: #e54545; }
        @keyframes pulse-dot { 0%, 100% { box-shadow: 0 0 0 0 rgba(13, 158, 108, 0.5); } 50% { box-shadow: 0 0 0 8px rgba(13, 158, 108, 0); } }

        .view { display: none; animation: slideIn 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
        .view.active { display: block; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        .toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
        .toast {
            padding: 12px 20px; border-radius: var(--radius); color: #fff; font-weight: 600; font-size: 14px;
            letter-spacing: 0.3px; box-shadow: var(--shadow-lg);
            animation: toastIn 0.4s cubic-bezier(0.4, 0, 0.2, 1), toastOut 0.3s ease 2.5s forwards;
            pointer-events: auto; text-align: center; max-width: 380px;
        }
        .toast-success { background: #0d9e6c; } .toast-error { background: #e54545; } .toast-info { background: #1a73e8; }
        @keyframes toastIn { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-20px); } }

        .unlock-animation { text-align: center; padding: 30px 20px; }
        .unlock-icon-circle {
            width: 90px; height: 90px; border-radius: 50%;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 40px; margin-bottom: 16px; transition: all 0.5s ease;
        }
        .unlock-icon-circle.locked { background: #fde8e8; color: #e54545; animation: shake 0.6s ease; }
        .unlock-icon-circle.unlocking { background: #fff8e6; color: #f5a623; animation: pulse 1s infinite; }
        .unlock-icon-circle.unlocked { background: #e6f7ee; color: #0d9e6c; animation: bounceIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 50% { transform: translateX(8px); } 75% { transform: translateX(-5px); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
        @keyframes bounceIn { 0% { transform: scale(0.3); opacity: 0; } 50% { transform: scale(1.08); } 70% { transform: scale(0.95); } 100% { transform: scale(1); opacity: 1; } }

        .log-list { list-style: none; max-height: 200px; overflow-y: auto; font-size: 12px; }
        .log-list li { padding: 8px 10px; border-bottom: 1px solid var(--border-light); display: flex; justify-content: space-between; align-items: center; gap: 8px; letter-spacing: 0.2px; }
        .log-list li:last-child { border-bottom: none; }
        .log-time { color: var(--text-light); font-size: 10px; white-space: nowrap; }

        .pin-input-group { display: flex; gap: 8px; justify-content: center; margin: 8px 0; }
        .pin-input-group input {
            width: 44px; height: 52px; text-align: center; font-size: 22px; font-weight: 700;
            border: 2px solid var(--border); border-radius: var(--radius-sm); background: #fafbfc;
            transition: all var(--transition-fast); outline: none;
            font-family: 'SF Mono', 'Consolas', 'Monaco', monospace; letter-spacing: 2px;
        }
        .pin-input-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(26, 115, 232, 0.08); background: #fff; }
        .pin-input-group input.filled { border-color: #93c5fd; background: #fff; }

        .divider-text { display: flex; align-items: center; gap: 10px; color: var(--text-light); font-size: 11px; letter-spacing: 0.5px; margin: 16px 0; }
        .divider-text::before, .divider-text::after { content: ''; flex: 1; height: 1px; background: var(--border); }

        @media (max-width: 480px) {
            .app-container { border-radius: var(--radius-lg); min-height: auto; }
            .app-content { padding: 20px 16px 18px; }
            .logo-icon { width: 44px; height: 44px; font-size: 20px; border-radius: 12px; }
            .logo-title { font-size: 18px; }
            .form-input { padding: 10px 12px 10px 36px; font-size: 14px; }
            .btn { padding: 11px 16px; font-size: 14px; }
            .qr-container { padding: 14px; }
        }
        ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; } ::-webkit-scrollbar-thumb:hover { background: #b0b7c3; }
    </style>
</head>
<body>
    <div class="bg-particles">
        <div class="bg-particle"></div><div class="bg-particle"></div><div class="bg-particle"></div>
        <div class="bg-particle"></div><div class="bg-particle"></div><div class="bg-particle"></div>
    </div>
    <div class="toast-container" id="toastContainer"></div>

    <div class="app-container" id="appContainer">
        <div class="app-header-bar"></div>
        <div class="app-content">

            <!-- 登录视图 -->
            <div class="view active" id="loginView">
                <div class="logo-area">
                    <div class="logo-icon"><i class="fas fa-lock"></i></div>
                    <div class="logo-title">智能门锁管理平台</div>
                    <div class="logo-subtitle">OneNET IoT · 安全可靠</div>
                </div>
                <form id="loginForm" autocomplete="off">
                    <div class="form-group">
                        <label class="form-label">用户名</label>
                        <div class="form-input-wrapper">
                            <i class="fas fa-user input-icon"></i>
                            <input type="text" class="form-input" id="loginUsername" placeholder="请输入用户名" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">登录密码</label>
                        <div class="form-input-wrapper">
                            <i class="fas fa-key input-icon"></i>
                            <input type="password" class="form-input" id="loginPassword" placeholder="请输入密码" required>
                        </div>
                        <div class="form-error-msg" id="loginError"></div>
                    </div>
                    <button type="submit" class="btn btn-primary" id="loginBtn">
                        <span class="btn-text">登 录</span>
                        <span class="spinner"></span>
                    </button>
                </form>
                <div class="divider-text">还没有账号？</div>
                <button class="btn btn-outline" onclick="switchView('registerView')">
                    <i class="fas fa-user-plus"></i> 创建新账号
                </button>
            </div>

            <!-- 注册视图 -->
            <div class="view" id="registerView">
                <div class="logo-area">
                    <div class="logo-icon"><i class="fas fa-user-plus"></i></div>
                    <div class="logo-title">创建新账号</div>
                    <div class="logo-subtitle">设置您的开锁密码与设备信息</div>
                </div>
                <form id="registerForm" autocomplete="off">
                    <div class="form-group">
                        <label class="form-label">用户名</label>
                        <div class="form-input-wrapper">
                            <i class="fas fa-user input-icon"></i>
                            <input type="text" class="form-input" id="regUsername" placeholder="请输入用户名" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">登录密码</label>
                        <div class="form-input-wrapper">
                            <i class="fas fa-key input-icon"></i>
                            <input type="password" class="form-input" id="regPassword" placeholder="至少6位" required minlength="6">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">🔐 开锁密码（6位数字）</label>
                        <div class="form-input-wrapper">
                            <i class="fas fa-shield-alt input-icon"></i>
                            <input type="text" class="form-input" id="regUnlockPin" placeholder="6位数字开锁密码" required minlength="6" maxlength="6" pattern="[0-9]{6}" inputmode="numeric">
                        </div>
                        <div class="form-error-msg" id="regPinError"></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">🔗 OneNET 设备ID（可选）</label>
                        <div class="form-input-wrapper">
                            <i class="fas fa-microchip input-icon"></i>
                            <input type="text" class="form-input" id="regDeviceId" placeholder="OneNET设备ID（可选）">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">🔑 OneNET API密钥（可选）</label>
                        <div class="form-input-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="text" class="form-input" id="regApiKey" placeholder="API Key（可选）">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary" id="registerBtn">
                        <span class="btn-text">注 册</span>
                        <span class="spinner"></span>
                    </button>
                </form>
                <div class="divider-text">已有账号？</div>
                <button class="btn btn-outline" onclick="switchView('loginView')">
                    <i class="fas fa-sign-in-alt"></i> 返回登录
                </button>
            </div>

            <!-- 仪表盘视图 -->
            <div class="view" id="dashboardView">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
                    <div>
                        <h2 style="font-size:18px;color:var(--text);margin:0;"><i class="fas fa-tachometer-alt" style="color:var(--primary);"></i> 控制台</h2>
                        <span style="font-size:12px;color:var(--text-secondary);" id="dashWelcome">欢迎回来</span>
                    </div>
                    <button class="btn btn-sm btn-outline" onclick="handleLogout()" title="退出登录"><i class="fas fa-sign-out-alt"></i></button>
                </div>

                <div class="card" id="deviceStatusCard">
                    <div style="display:flex;justify-content:space-between;align-items:center;">
                        <span style="font-weight:600;font-size:14px;"><i class="fas fa-microchip"></i> 设备状态</span>
                        <span class="badge badge-warning" id="deviceBadge"><span class="badge-dot orange"></span> 未绑定</span>
                    </div>
                    <div style="font-size:12px;color:var(--text-secondary);margin-top:4px;" id="deviceInfoText">请在设置中绑定OneNET设备</div>
                </div>

                <div class="qr-container" id="qrContainer">
                    <div class="qr-wrapper" id="qrCodeWrapper"></div>
                    <div class="qr-label">
                        扫描此二维码开门<br>
                        <span style="font-size:10px;color:var(--text-light);">用户ID: </span>
                        <span class="qr-uid" id="qrUidDisplay"></span>
                    </div>
                </div>

                <div style="display:flex;gap:10px;flex-wrap:wrap;">
                    <button class="btn btn-primary btn-sm" onclick="simulateScan()" style="flex:1;"><i class="fas fa-qrcode"></i> 模拟扫码开锁</button>
                    <button class="btn btn-outline btn-sm" onclick="switchView('settingsView')" style="flex:1;"><i class="fas fa-cog"></i> 设备设置</button>
                </div>

                <div class="card" style="margin-top:14px;">
                    <div style="font-weight:600;font-size:13px;margin-bottom:8px;"><i class="fas fa-history"></i> 最近开锁记录</div>
                    <ul class="log-list" id="logList"><li style="color:var(--text-light);text-align:center;">暂无记录</li></ul>
                </div>
            </div>

            <!-- 设置视图 -->
            <div class="view" id="settingsView">
                <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
                    <button class="btn btn-sm btn-outline" onclick="switchView('dashboardView')" style="width:auto;"><i class="fas fa-arrow-left"></i></button>
                    <h2 style="font-size:16px;color:var(--text);margin:0;">⚙️ OneNET 设备绑定</h2>
                </div>
                <form id="settingsForm" autocomplete="off">
                    <div class="form-group">
                        <label class="form-label">OneNET 产品ID</label>
                        <div class="form-input-wrapper"><i class="fas fa-box input-icon"></i><input type="text" class="form-input" id="setProductId" placeholder="例如：123456"></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">OneNET 设备ID</label>
                        <div class="form-input-wrapper"><i class="fas fa-microchip input-icon"></i><input type="text" class="form-input" id="setDeviceId" placeholder="例如：987654321"></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">API 密钥 (Master Key)</label>
                        <div class="form-input-wrapper"><i class="fas fa-key input-icon"></i><input type="text" class="form-input" id="setApiKey" placeholder="OneNET API Key"></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">🔐 修改开锁密码（6位数字）</label>
                        <div class="form-input-wrapper"><i class="fas fa-shield-alt input-icon"></i><input type="text" class="form-input" id="setUnlockPin" placeholder="留空则不修改" maxlength="6" pattern="[0-9]{6}" inputmode="numeric"></div>
                    </div>
                    <button type="submit" class="btn btn-primary" id="saveSettingsBtn"><span class="btn-text">💾 保存设置</span><span class="spinner"></span></button>
                </form>
                <button class="btn btn-outline" style="margin-top:10px;" id="testConnectionBtn" onclick="testOneNETConnection()"><i class="fas fa-plug"></i> 测试OneNET连接</button>
                <div id="testResult" style="margin-top:8px;font-size:12px;text-align:center;"></div>
            </div>

            <!-- 验证视图 -->
            <div class="view" id="verifyView">
                <div style="text-align:center;margin-bottom:16px;">
                    <div class="logo-icon" style="background:linear-gradient(135deg,#0d9e6c,#10b981);"><i class="fas fa-door-open"></i></div>
                    <h2 style="font-size:17px;color:var(--text);margin-top:8px;">身份验证</h2>
                    <p style="font-size:12px;color:var(--text-secondary);" id="verifyTargetUser">正在验证开门权限...</p>
                </div>
                <div class="unlock-animation" id="unlockAnimArea">
                    <div class="unlock-icon-circle locked" id="unlockIconCircle"><i class="fas fa-lock"></i></div>
                    <p style="font-size:13px;color:var(--text-secondary);" id="unlockStatusText">请输入6位开锁密码</p>
                </div>
                <div class="form-group">
                    <label class="form-label" style="text-align:center;display:block;">🔐 开锁密码</label>
                    <div class="pin-input-group" id="pinInputGroup">
                        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" class="pin-digit" id="pin1">
                        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" class="pin-digit" id="pin2">
                        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" class="pin-digit" id="pin3">
                        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" class="pin-digit" id="pin4">
                        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" class="pin-digit" id="pin5">
                        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" class="pin-digit" id="pin6">
                    </div>
                    <div class="form-error-msg" id="verifyError" style="text-align:center;"></div>
                </div>
                <button class="btn btn-primary" id="verifyUnlockBtn" onclick="verifyAndUnlock()">
                    <span class="btn-text"><i class="fas fa-unlock"></i> 验证并开锁</span>
                    <span class="spinner"></span>
                </button>
                <button class="btn btn-outline" style="margin-top:8px;" onclick="goToDashboardFromVerify()"><i class="fas fa-home"></i> 返回首页</button>
                <p style="text-align:center;margin-top:10px;font-size:10px;color:var(--text-light);">提示：密码为主人预设的6位数字开锁密码</p>
            </div>
        </div>
    </div>

    <script>
        // ==================== 全局唯一 Supabase 初始化 ====================
        const SUPABASE_URL = 'https://khngdzstzwyeamehmmqt.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_am1XRk1u-C6Z5jXckYfr1w_ILu1-McA';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ==================== Toast 提示 ====================
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // ==================== 视图切换 ====================
        function switchView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            const target = document.getElementById(viewId);
            if (target) target.classList.add('active');
            document.getElementById('appContainer').scrollIntoView({ behavior: 'smooth' });

            if (viewId === 'dashboardView') initDashboard();
            else if (viewId === 'settingsView') initSettings();
            else if (viewId === 'verifyView') initVerifyView();
        }

        // ==================== 日志存储（兼容隐私模式） ====================
        function addLog(uid, message, status) {
            try {
                const data = localStorage.getItem('smartlock_logs');
                const allLogs = data ? JSON.parse(data) : [];
                allLogs.push({ uid, message, status, time: new Date().toISOString() });
                localStorage.setItem('smartlock_logs', JSON.stringify(allLogs.slice(-500)));
            } catch (e) {
                // 隐私模式下 localStorage 可能不可用，忽略
            }
        }

        function getLogs(uid) {
            try {
                const data = localStorage.getItem('smartlock_logs');
                const allLogs = data ? JSON.parse(data) : [];
                return allLogs.filter(l => l.uid === uid).slice(-20).reverse();
            } catch (e) {
                return [];
            }
        }

        function renderLogs(uid) {
            const logList = document.getElementById('logList');
            const logs = getLogs(uid);
            if (logs.length === 0) {
                logList.innerHTML = '<li style="color:var(--text-light);text-align:center;">暂无记录</li>';
                return;
            }
            logList.innerHTML = logs.map(l => {
                const time = new Date(l.time).toLocaleString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                const icon = l.status === 'success' ? '✅' : (l.status === 'fail' ? '❌' : 'ℹ️');
                return `<li><span>${icon} ${l.message}</span><span class="log-time">${time}</span></li>`;
            }).join('');
        }

        // ==================== 登录 ====================
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errorEl = document.getElementById('loginError');
            const btn = document.getElementById('loginBtn');

            errorEl.classList.remove('show');
            if (!username || !password) {
                errorEl.textContent = '请填写用户名和密码';
                errorEl.classList.add('show');
                return;
            }

            btn.classList.add('loading');
            btn.disabled = true;

            const email = `${username}@smartlock.local`;
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });

            if (error) {
                errorEl.textContent = '用户名或密码错误';
                errorEl.classList.add('show');
                btn.classList.remove('loading');
                btn.disabled = false;
                return;
            }

            addLog(data.user.id, '用户登录成功', 'info');
            showToast('✅ 登录成功！', 'success');
            btn.classList.remove('loading');
            btn.disabled = false;
            document.getElementById('loginForm').reset();
            switchView('dashboardView');
        });

        // ==================== 注册 ====================
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const unlockPin = document.getElementById('regUnlockPin').value.trim();
            const deviceId = document.getElementById('regDeviceId').value.trim();
            const apiKey = document.getElementById('regApiKey').value.trim();
            const pinErrorEl = document.getElementById('regPinError');
            const btn = document.getElementById('registerBtn');

            pinErrorEl.classList.remove('show');
            if (username.length < 2) { showToast('用户名至少2个字符', 'error'); return; }
            if (password.length < 6) { showToast('登录密码至少6位', 'error'); return; }
            if (!/^\d{6}$/.test(unlockPin)) {
                pinErrorEl.textContent = '开锁密码必须为6位纯数字';
                pinErrorEl.classList.add('show');
                return;
            }

            btn.classList.add('loading');
            btn.disabled = true;

            const email = `${username}@smartlock.local`;
            const { data, error } = await supabase.auth.signUp({ email, password });

            if (error) {
                showToast('注册失败: ' + error.message, 'error');
                btn.classList.remove('loading');
                btn.disabled = false;
                return;
            }

            const user = data.user;
            if (!user) {
                showToast('注册失败，请重试', 'error');
                btn.classList.remove('loading');
                btn.disabled = false;
                return;
            }

            // 插入 profiles 表
            const { error: profileError } = await supabase
                .from('profiles')
                .insert([{
                    id: user.id,
                    unlock_pin: unlockPin,
                    device_id: deviceId || '',
                    product_id: '',
                    api_key: apiKey || '',
                }]);

            if (profileError) {
                showToast('用户信息保存失败，请确认邮箱验证已关闭或重试', 'error');
                btn.classList.remove('loading');
                btn.disabled = false;
                return;
            }

            addLog(user.id, '账号注册成功', 'info');
            showToast('🎉 注册成功！请登录', 'success');
            btn.classList.remove('loading');
            btn.disabled = false;
            document.getElementById('registerForm').reset();
            switchView('loginView');
        });

        // ==================== 获取当前用户资料 ====================
        async function getCurrentProfile() {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) return null;

            const { data, error } = await supabase
                .from('profiles')
                .select('*')
                .eq('id', user.id)
                .single();

            if (error || !data) return null;
            return {
                id: user.id,
                username: user.email.split('@')[0],
                unlockPin: data.unlock_pin,
                deviceId: data.device_id,
                productId: data.product_id,
                apiKey: data.api_key,
                createdAt: data.created_at,
            };
        }

        // ==================== 仪表盘 ====================
        async function initDashboard() {
            const profile = await getCurrentProfile();
            if (!profile) {
                switchView('loginView');
                showToast('请先登录', 'info');
                return;
            }

            document.getElementById('dashWelcome').textContent = `欢迎，${profile.username}`;
            document.getElementById('qrUidDisplay').textContent = profile.id;

            const qrWrapper = document.getElementById('qrCodeWrapper');
            qrWrapper.innerHTML = '';
            const verifyUrl = window.location.origin + window.location.pathname + '?verify=' + profile.id;
            try {
                new QRCode(qrWrapper, {
                    text: verifyUrl,
                    width: 180,
                    height: 180,
                    colorDark: '#1f2937',
                    colorLight: '#ffffff',
                    correctLevel: QRCode.CorrectLevel.M,
                });
            } catch (err) {
                qrWrapper.innerHTML = '<div style="width:180px;height:180px;display:flex;align-items:center;justify-content:center;background:#f3f4f6;border-radius:8px;color:#9ca3af;font-size:12px;">二维码加载失败</div>';
            }

            updateDeviceStatusUI(profile);
            renderLogs(profile.id);
        }

        function updateDeviceStatusUI(profile) {
            const badge = document.getElementById('deviceBadge');
            const infoText = document.getElementById('deviceInfoText');
            if (profile.deviceId && profile.apiKey) {
                badge.innerHTML = '<span class="badge-dot green"></span> 已绑定';
                badge.className = 'badge badge-success';
                infoText.textContent = `设备ID: ${profile.deviceId} | 在线`;
            } else if (profile.deviceId && !profile.apiKey) {
                badge.innerHTML = '<span class="badge-dot orange"></span> 配置不完整';
                badge.className = 'badge badge-warning';
                infoText.textContent = '请完善API密钥配置';
            } else {
                badge.innerHTML = '<span class="badge-dot orange"></span> 未绑定';
                badge.className = 'badge badge-warning';
                infoText.textContent = '请在设置中绑定OneNET设备';
            }
        }

        function simulateScan() {
            const qrUid = document.getElementById('qrUidDisplay').textContent;
            if (qrUid) window.location.href = window.location.pathname + '?verify=' + qrUid;
        }

        async function handleLogout() {
            await supabase.auth.signOut();
            switchView('loginView');
            showToast('已安全退出', 'info');
        }

        // ==================== 设置页面 ====================
        async function initSettings() {
            const profile = await getCurrentProfile();
            if (!profile) return;
            document.getElementById('setProductId').value = profile.productId || '';
            document.getElementById('setDeviceId').value = profile.deviceId || '';
            document.getElementById('setApiKey').value = profile.apiKey || '';
            document.getElementById('setUnlockPin').value = '';
            document.getElementById('testResult').innerHTML = '';
        }

        document.getElementById('settingsForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('saveSettingsBtn');
            const productId = document.getElementById('setProductId').value.trim();
            const deviceId = document.getElementById('setDeviceId').value.trim();
            const apiKey = document.getElementById('setApiKey').value.trim();
            const unlockPin = document.getElementById('setUnlockPin').value.trim();

            if (unlockPin && !/^\d{6}$/.test(unlockPin)) {
                showToast('开锁密码必须为6位纯数字', 'error');
                return;
            }

            const { data: { user } } = await supabase.auth.getUser();
            if (!user) return showToast('未登录', 'error');

            btn.classList.add('loading');
            btn.disabled = true;

            const updates = { product_id: productId, device_id: deviceId, api_key: apiKey };
            if (unlockPin) updates.unlock_pin = unlockPin;

            const { error } = await supabase.from('profiles').update(updates).eq('id', user.id);

            if (error) showToast('保存失败: ' + error.message, 'error');
            else {
                showToast('✅ 设置已保存', 'success');
                document.getElementById('setUnlockPin').value = '';
            }
            btn.classList.remove('loading');
            btn.disabled = false;
        });

        function testOneNETConnection() {
            const resultEl = document.getElementById('testResult');
            const btn = document.getElementById('testConnectionBtn');
            const deviceId = document.getElementById('setDeviceId').value.trim();
            const apiKey = document.getElementById('setApiKey').value.trim();

            if (!deviceId || !apiKey) {
                resultEl.innerHTML = '<span style="color:#e54545;">❌ 请先填写设备ID和API密钥</span>';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner" style="display:inline-block;width:16px;height:16px;"></span> 测试中...';
            resultEl.innerHTML = '<span style="color:#f5a623;">⏳ 正在连接OneNET平台...</span>';

            setTimeout(() => {
                if (Math.random() < 0.85) {
                    resultEl.innerHTML = '<span style="color:#0d9e6c;">✅ 连接成功！设备在线</span>';
                    showToast('OneNET连接测试成功', 'success');
                } else {
                    resultEl.innerHTML = '<span style="color:#e54545;">❌ 连接失败：设备离线或超时</span>';
                    showToast('连接测试失败', 'error');
                }
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-plug"></i> 测试OneNET连接';
            }, 1500);
        }

        // ==================== 开锁验证 ====================
        function initVerifyView() {
            const urlParams = new URLSearchParams(window.location.search);
            const verifyUid = urlParams.get('verify');
            const view = document.getElementById('verifyView');
            view.dataset.verifyUid = verifyUid || '';

            if (!verifyUid) {
                document.getElementById('verifyTargetUser').textContent = '无效的二维码链接';
                document.getElementById('unlockStatusText').textContent = '缺少用户标识';
                return;
            }

            document.getElementById('verifyTargetUser').textContent = `正在验证门锁权限 (ID: ${verifyUid.substring(0, 8)}...)`;
            document.getElementById('unlockStatusText').textContent = '请输入6位开锁密码';
            const iconCircle = document.getElementById('unlockIconCircle');
            iconCircle.className = 'unlock-icon-circle locked';
            iconCircle.innerHTML = '<i class="fas fa-lock"></i>';
            document.getElementById('verifyError').classList.remove('show');
            document.querySelectorAll('.pin-digit').forEach(inp => { inp.value = ''; inp.classList.remove('filled'); });
            setTimeout(() => document.getElementById('pin1')?.focus(), 300);
        }

        // PIN 输入处理
        document.getElementById('pinInputGroup').addEventListener('input', function(e) {
            const target = e.target;
            if (target.classList.contains('pin-digit')) {
                const val = target.value;
                if (!/^\d$/.test(val) && val !== '') { target.value = ''; return; }
                if (val) {
                    target.classList.add('filled');
                    const allInputs = Array.from(document.querySelectorAll('.pin-digit'));
                    const idx = allInputs.indexOf(target);
                    if (idx < allInputs.length - 1) allInputs[idx + 1].focus();
                } else {
                    target.classList.remove('filled');
                }
            }
        });

        document.getElementById('pinInputGroup').addEventListener('keydown', function(e) {
            if (e.key === 'Backspace') {
                const target = e.target;
                if (target.classList.contains('pin-digit') && target.value === '') {
                    const allInputs = Array.from(document.querySelectorAll('.pin-digit'));
                    const idx = allInputs.indexOf(target);
                    if (idx > 0) { allInputs[idx - 1].focus(); allInputs[idx - 1].value = ''; allInputs[idx - 1].classList.remove('filled'); }
                }
            }
            if (e.key === 'Enter') verifyAndUnlock();
        });

        document.getElementById('pinInputGroup').addEventListener('paste', function(e) {
            e.preventDefault();
            const pasteData = (e.clipboardData || window.clipboardData).getData('text');
            const digits = pasteData.replace(/\D/g, '').substring(0, 6);
            const allInputs = Array.from(document.querySelectorAll('.pin-digit'));
            allInputs.forEach((inp, i) => {
                if (i < digits.length) { inp.value = digits[i]; inp.classList.add('filled'); }
                else { inp.value = ''; inp.classList.remove('filled'); }
            });
            if (digits.length === 6) setTimeout(() => verifyAndUnlock(), 400);
        });

        async function verifyAndUnlock() {
            const view = document.getElementById('verifyView');
            const verifyUid = view.dataset.verifyUid;
            const errorEl = document.getElementById('verifyError');
            const btn = document.getElementById('verifyUnlockBtn');
            const iconCircle = document.getElementById('unlockIconCircle');
            const statusText = document.getElementById('unlockStatusText');

            errorEl.classList.remove('show');
            if (!verifyUid) { showToast('无效验证会话', 'error'); return; }

            const pinInput = Array.from(document.querySelectorAll('.pin-digit')).map(i => i.value).join('');
            if (pinInput.length !== 6) {
                errorEl.textContent = '请输入完整的6位密码';
                errorEl.classList.add('show');
                return;
            }

            btn.classList.add('loading');
            btn.disabled = true;

            // 从 Supabase 获取用户配置
            const { data: profileData, error: profileError } = await supabase
                .from('profiles')
                .select('unlock_pin, device_id, api_key')
                .eq('id', verifyUid)
                .single();

            if (profileError || !profileData) {
                errorEl.textContent = '用户不存在或设备离线';
                errorEl.classList.add('show');
                btn.classList.remove('loading');
                btn.disabled = false;
                return;
            }

            if (pinInput !== profileData.unlock_pin) {
                errorEl.textContent = '密码错误';
                errorEl.classList.add('show');
                iconCircle.className = 'unlock-icon-circle locked';
                iconCircle.innerHTML = '<i class="fas fa-lock"></i>';
                statusText.textContent = '密码错误，请重试';
                addLog(verifyUid, '开锁密码验证失败', 'fail');
                btn.classList.remove('loading');
                btn.disabled = false;
                document.querySelectorAll('.pin-digit').forEach(inp => inp.value = '');
                document.getElementById('pin1')?.focus();
                return;
            }

            // 密码正确
            iconCircle.className = 'unlock-icon-circle unlocking';
            iconCircle.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            statusText.textContent = '密码正确，正在开锁...';

            const deviceId = profileData.device_id;
            const apiKey = profileData.api_key;

            // 模拟 OneNET 指令
            setTimeout(() => {
                const success = !!(deviceId && apiKey);
                btn.classList.remove('loading');
                btn.disabled = false;
                if (success) {
                    iconCircle.className = 'unlock-icon-circle unlocked';
                    iconCircle.innerHTML = '<i class="fas fa-unlock"></i>';
                    statusText.textContent = '🔓 开锁成功！门已打开';
                    addLog(verifyUid, '开锁成功（OneNET）', 'success');
                    setTimeout(() => {
                        iconCircle.className = 'unlock-icon-circle locked';
                        iconCircle.innerHTML = '<i class="fas fa-lock"></i>';
                        statusText.textContent = '门已自动锁定';
                        document.querySelectorAll('.pin-digit').forEach(inp => { inp.value = ''; inp.classList.remove('filled'); });
                    }, 4000);
                } else {
                    iconCircle.className = 'unlock-icon-circle locked';
                    iconCircle.innerHTML = '<i class="fas fa-exclamation-triangle"></i>';
                    statusText.textContent = '设备未绑定，无法开锁';
                    addLog(verifyUid, '开锁失败：设备未绑定', 'fail');
                    document.querySelectorAll('.pin-digit').forEach(inp => { inp.value = ''; inp.classList.remove('filled'); });
                }
            }, 1500);
        }

        function goToDashboardFromVerify() {
            switchView('dashboardView');
            window.history.pushState({}, '', window.location.pathname);
        }

        // ==================== 启动 ====================
        async function boot() {
            const { data: { user } } = await supabase.auth.getUser();
            const urlParams = new URLSearchParams(window.location.search);
            const verifyUid = urlParams.get('verify');

            if (verifyUid) {
                switchView('verifyView');
            } else if (user) {
                switchView('dashboardView');
            } else {
                switchView('loginView');
            }
        }

        // 全局暴露
        window.switchView = switchView;
        window.handleLogout = handleLogout;
        window.verifyAndUnlock = verifyAndUnlock;
        window.goToDashboardFromVerify = goToDashboardFromVerify;
        window.simulateScan = simulateScan;
        window.testOneNETConnection = testOneNETConnection;

        document.addEventListener('DOMContentLoaded', boot);

        window.addEventListener('popstate', function() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('verify')) switchView('verifyView');
            else supabase.auth.getUser().then(({ data: { user } }) => {
                if (user) switchView('dashboardView');
                else switchView('loginView');
            });
        });
    </script>
</body>
</html>
